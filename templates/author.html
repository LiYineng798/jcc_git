<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>作者主页 - 金铲铲阵容库</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <div class="page-shell author-page-shell">
      <nav class="nav-bar" aria-label="页面工具">
        <a class="ghost-link" href="/">返回阵容库</a>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换深浅色模式">
          <span id="themeIcon">☾</span>
          <span id="themeText">夜间模式</span>
        </button>
      </nav>

      <header class="auth-hero">
        <p class="eyebrow">Author</p>
        <h1>作者主页</h1>
        <p class="hero-description">查看作者公开资料、已发布阵容与累计互动数据。</p>
      </header>

      <section class="panel" aria-label="作者主页区域">
        <div id="authorApp" data-username="{{ username }}">作者主页加载中...</div>
      </section>
    </div>
    <div id="authPromptRoot"></div>
    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
    <script src="{{ url_for('static', filename='history-store.js') }}" defer></script>
    <script src="{{ url_for('static', filename='auth-intent.js') }}" defer></script>
    <script src="{{ url_for('static', filename='author.js') }}" defer></script>
  </body>
</html>
