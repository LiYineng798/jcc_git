<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>金铲铲阵容库</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <nav class="nav-bar" aria-label="页面工具">
          <div class="brand-mark" aria-hidden="true">阵</div>
          <div class="nav-actions">
            <a class="ghost-link hidden" id="adminLink" href="/admin">后台</a>
            <a class="ghost-link hidden" id="accountLink" href="/me">个人中心</a>
            <span class="auth-status nav-user" id="authStatus">未登录</span>
            <a class="ghost-link" id="authLink" href="/auth">登录 / 注册</a>
            <button class="ghost-button hidden" id="logoutButton" type="button">退出</button>
            <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换深浅色模式">
              <span id="themeIcon">☾</span>
              <span id="themeText">夜间模式</span>
            </button>
          </div>
        </nav>
        <div class="hero-grid">
          <section class="hero-copy">
            <p class="eyebrow">JCC Lineup Manager</p>
            <h1>金铲铲阵容库</h1>
            <p class="hero-description hero-benefits">保存、搜索、点赞和复制阵容码。登录后可收藏阵容并跨设备同步，登录后可查看我的收藏和我的阵容。</p>
          </section>
          <section class="stat-card" aria-label="阵容统计">
            <span class="stat-label">已展示</span>
            <strong id="lineupCount">0</strong>
            <span class="stat-caption">套阵容</span>
            <a class="primary-link stat-action-link" id="createLineupLink" href="/auth">登录后新增阵容</a>
          </section>
        </div>
      </header>

      <main class="content-grid">
        <section class="panel list-panel list-panel-full" aria-labelledby="listTitle">
          <div class="panel-heading list-heading">
            <div>
              <p class="section-kicker">Library</p>
              <h2 id="listTitle">阵容列表</h2>
            </div>
            <label class="search-field"><span class="sr-only">搜索阵容名称</span><input id="searchInput" type="search" placeholder="搜索阵容名称，例如：九五、卡莎、斗士" /></label>
          </div>
          <div class="tabs" id="tabs">
            <button class="tab active" data-sort="live" data-view="live-comps">实时阵容排行</button>
            <button class="tab" data-sort="latest" data-view="all">最新</button>
            <button class="tab" data-sort="hot" data-view="all">最热</button>
            <button class="tab" data-sort="rising" data-view="all">上升</button>
            <button class="tab" data-sort="recommended" data-view="all">推荐</button>
            <button class="tab" data-sort="ss" data-view="all">SS</button>
            <button class="tab" id="favoritesTab" data-sort="latest" data-view="favorites">我的收藏</button>
            <button class="tab hidden" id="mineTab" data-sort="latest" data-view="mine">我的</button>
          </div>
          <div class="message" id="message" role="status" aria-live="polite"></div>
          <div class="lineup-list" id="lineupList" data-author-link-class="author-link"></div>
          <div class="pagination" id="pagination"></div>
          <div class="empty-state hidden" id="emptyState"><div class="empty-icon">⌘</div><h3>还没有阵容</h3><p>登录后可收藏阵容并随时找回，也可以上传第一套阵容或切换到全部阵容查看公开内容。</p></div>
        </section>
      </main>
    </div>
    <div id="authPromptRoot"></div>
    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
    <script src="{{ url_for('static', filename='history-store.js') }}" defer></script>
    <script src="{{ url_for('static', filename='auth-intent.js') }}" defer></script>
    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
  </body>
</html>
